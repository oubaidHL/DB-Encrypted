%YAML 1.1
---
# =============================================================
# Suricata config — TP1 SecureNet SA
# Compatible Suricata 8.x
# =============================================================

vars:
  address-groups:
    HOME_NET: "[192.168.100.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "$HOME_NET"
    DNS_SERVERS: "$HOME_NET"
  port-groups:
    HTTP_PORTS: "80"
    SSH_PORTS: 22
    FTP_PORTS: 21

# ── Capture ───────────────────────────────────────────────────
af-packet:
  - interface: eth0
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes

# ── Outputs ───────────────────────────────────────────────────
outputs:
  - fast:
      enabled: yes
      filename: fast.log
      append: yes

  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            payload: yes
            payload-printable: yes
            metadata: yes
        - http:
            extended: yes
        - dns:
            query: yes
            answer: yes
        - tls:
            extended: yes
        - ssh: {}
        - flow: {}

  - stats:
      enabled: yes
      filename: stats.log
      totals: yes

# ── Logging ───────────────────────────────────────────────────
logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
    - file:
        enabled: yes
        level: info
        filename: /var/log/suricata/suricata.log

# ── Rules ─────────────────────────────────────────────────────
# On ne charge QUE local.rules pour éviter le warning suricata.rules manquant
# Les règles communautaires peuvent être ajoutées après suricata-update manuel
default-rule-path: /etc/suricata/rules

rule-files:
  - local.rules

# ── App-layer ─────────────────────────────────────────────────
app-layer:
  protocols:
    tls:
      enabled: yes
    ftp:
      enabled: yes
    ssh:
      enabled: yes
    smtp:
      enabled: yes
    http:
      enabled: yes
    dns:
      tcp:
        enabled: yes
      udp:
        enabled: yes
    http2:
      enabled: yes
    dnp3:
      enabled: no
      detection-enabled: no
    modbus:
      enabled: no
      detection-enabled: no

# ── NFQ (mode IPS) ────────────────────────────────────────────
nfq:
  mode: accept
  repeat-mark: 1
  repeat-mask: 1

# ── Flow ──────────────────────────────────────────────────────
flow:
  memcap: 64mb
  hash-size: 65536
  prealloc: 10000
  emergency-recovery: 30

# ── Stream ────────────────────────────────────────────────────
stream:
  memcap: 64mb
  checksum-validation: no
  inline: auto
  reassembly:
    memcap: 128mb
    depth: 1mb

# ── Host ──────────────────────────────────────────────────────
host:
  hash-size: 4096
  prealloc: 1000
  memcap: 32mb
